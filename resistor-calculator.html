<html>

<head>
    <title>Resistor Calculator</title>
    <meta charset="utf-8" />
    <!-- <script src="https://d3js.org/d3.v4.min.js"></script> -->
    <script src="d3.min.js"></script>
    <style>
        path.domain {
            stroke: none;
        }
    </style>
</head>

<body>
    <div>
        <svg style="width:500px;height:220px" />
    </div>
    <script>

        var resistorBodyShape = [
            { a: 1, b: 2 },
            { a: 2, b: 3 },
            { a: 5, b: 3 },
            { a: 7, b: 2 },
            { a: 15, b: 2 },
            { a: 17, b: 3 },
            { a: 20, b: 3 },
            { a: 21, b: 2 },
        ];

        var xScale = d3.scaleLinear().domain([0, 22]).range([20, 480]);
        var yScale = d3.scaleLinear().domain([-4, 4]).range([200, 20]);

        var xAxis = d3.axisBottom()
            .scale(xScale)
            .tickSize(200)
            .ticks(22);

        var yAxis = d3.axisRight()
            .scale(yScale)
            .tickSize(480)
            .ticks(9);

        //d3.select("svg").append("g").attr("id", "xAxisG").call(xAxis);
        //d3.select("svg").append("g").attr("id", "yAxisG").call(yAxis);

        // TODO: Figure out if the curve should be kept, is it possible to draw a rect or something within the lines?

        d3.select("svg")
            .append("line")
            .attr("x1", xScale(0))
            .attr("x2", xScale(22))
            .attr("y1", yScale(0))
            .attr("y2", yScale(0))
            .style("stroke", "black")
            .style("stroke-width", 16);

        var shapeArea = d3.area()
            .x(d => xScale(d.a))
            .y0(d => yScale(d.b))
            .y1(d => yScale(-d.b)).curve(d3.curveCardinal);

        d3.select("svg")
            .append("path")
            .attr("d", shapeArea(resistorBodyShape))
            .attr("fill", "#d1c7c7")
            .attr("stroke", "black")
            .attr("stroke-width", 2);


    </script>
</body>

</html>
