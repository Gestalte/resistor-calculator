<html>

<head>
    <title>Resistor Calculator</title>
    <meta charset="utf-8" />
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <!-- <script src="d3.min.js"></script> -->
    <style>
        path.domain {
            stroke: none;
        }

        #infobox {
            position: fixed;
            left: 500px;
            top: 50px;
            z-index: 1;
            background: white;
            border: 1px black solid;
        }

        tr {
            border: 1px gray solid;
        }

        td.data {
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div>
        <svg style="width:500px;height:220px" />
    </div>
    <div id="controls"></div>
    <script>

        var resistorBodyShape = [
            { a: 1, b: 2 },
            { a: 2, b: 3 },
            { a: 5, b: 3 },
            { a: 7, b: 2 },
            { a: 15, b: 2 },
            { a: 17, b: 3 },
            { a: 20, b: 3 },
            { a: 21, b: 2 },
        ];

        var xScale = d3.scaleLinear().domain([0, 22]).range([20, 480]);
        var yScale = d3.scaleLinear().domain([-4, 4]).range([200, 20]);

        var xAxis = d3.axisBottom()
            .scale(xScale)
            .tickSize(200)
            .ticks(22);

        var yAxis = d3.axisRight()
            .scale(yScale)
            .tickSize(480)
            .ticks(9);

        //d3.select("svg").append("g").attr("id", "xAxisG").call(xAxis);
        //d3.select("svg").append("g").attr("id", "yAxisG").call(yAxis);

        // TODO: Figure out if the curve should be kept, is it possible to draw a rect or something within the lines?

        // Wire
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(0))
            .attr("x2", xScale(22))
            .attr("y1", yScale(0))
            .attr("y2", yScale(0))
            .style("stroke", "black")
            .style("stroke-width", 16);

        var shapeArea = d3.area()
            .x(d => xScale(d.a))
            .y0(d => yScale(d.b))
            .y1(d => yScale(-d.b)).curve(d3.curveCardinal);

        // Resistor body
        d3.select("svg")
            .append("path")
            .attr("d", shapeArea(resistorBodyShape))
            .attr("fill", "lavender")
            .attr("stroke", "black")
            .attr("stroke-width", 2);

        // Band 1
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(3) + 8)
            .attr("x2", xScale(3) + 8)
            .attr("y1", yScale(3))
            .attr("y2", yScale(-3))
            .style("stroke", "brown")
            .style("stroke-width", 16);

        // Band 2
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(7) + 8)
            .attr("x2", xScale(7) + 8)
            .attr("y1", yScale(2))
            .attr("y2", yScale(-2))
            .style("stroke", "white")
            .style("stroke-width", 16);

        // Band 3
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(9) + 8)
            .attr("x2", xScale(9) + 8)
            .attr("y1", yScale(2))
            .attr("y2", yScale(-2))
            .style("stroke", "silver")
            .style("stroke-width", 16);

        // Band 4
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(11) + 8)
            .attr("x2", xScale(11) + 8)
            .attr("y1", yScale(2))
            .attr("y2", yScale(-2))
            .style("stroke", "gold")
            .style("stroke-width", 16);

        // Band 5
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(14) + 8)
            .attr("x2", xScale(14) + 8)
            .attr("y1", yScale(2))
            .attr("y2", yScale(-2))
            .style("stroke", "red")
            .style("stroke-width", 16);

        // Band 6
        d3.select("svg")
            .append("line")
            .attr("x1", xScale(18) + 8)
            .attr("x2", xScale(18) + 8)
            .attr("y1", yScale(3))
            .attr("y2", yScale(-3))
            .style("stroke", "yellow")
            .style("stroke-width", 16);

        var basicBandItems = [
            "Black 0",
            "Brown 1",
            "Red 2",
            "Orange 3",
            "Yellow 4",
            "Green 5",
            "Blue 6",
            "Violet 7",
            "Gray 8",
            "White 9"
        ];

        var band1Items = basicBandItems;
        var band2Items = basicBandItems;
        var band3Items = basicBandItems;

        var multiplierBandItems = [
            "Black x1Ω",
            "Brown x10Ω",
            "Red x100Ω",
            "Orange x1kΩ",
            "Yellow x10kΩ",
            "Green x100kΩ",
            "Blue x1MΩ",
            "Violet x10MΩ",
            "Grey x100MΩ",
            "White x1GΩ",
            "Gold x0.1Ω",
            "Silver x0.01Ω"
        ];

        var toleranceBandItems = [
            "Brown ±1%",
            "Red ±2%",
            "Green ±0.5%",
            "Blue ±0.25%",
            "Violet ±0.1%",
            "Grey ±0.05%",
            "Gold ±5%",
            "Silver ±10%"
        ];

        var temperatureCoefficientBandItems = [
            "Brown 100ppm",
            "Red 50ppm",
            "Orange 15ppm",
            "Yellow 25ppm",
            "Blue 10ppm",
            "Violet 5ppm"
        ];

        function OhmUnits(amount) {
            var result = "";

            if (amount >= 1000000000) {
                result = "GΩ";
            } else if (amount >= 1000000) {
                result = "MΩ";
            } else if (amount >= 1000) {
                result = "KΩ";
            } else if (amount < 1000) {
                result = "Ω";
            }

            return result;
        }

        d3.text("infobox.html", data => {
            console.log("infobox: ", data);
            d3.select("body").append("div").attr("id", "infobox").html(data);
        });

    </script>
</body>

</html>
